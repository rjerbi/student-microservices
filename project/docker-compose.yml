services:

  # ===================== KAFKA (KRaft mode, no Zookeeper) =====================
  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 15s

  # ===================== gRPC MICROSERVICES =====================
  student-service:
    build: .
    container_name: student-service
    command: ["node", "student-service/server.js"]
    ports:
      - "50051:50051"

  course-service:
    build: .
    container_name: course-service
    command: ["node", "course-service/server.js"]
    ports:
      - "50052:50052"

  enrollment-service:
    build: .
    container_name: enrollment-service
    command: ["node", "enrollment-service/server.js"]
    ports:
      - "50053:50053"
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ===================== KAFKA CONSUMER (notification service) =====================
  kafka-consumer:
    build: .
    container_name: kafka-consumer
    command: ["node", "kafka/consumer.js"]
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ===================== API GATEWAY (REST + GraphQL) =====================
  gateway:
    build: .
    container_name: api-gateway
    command: ["node", "gateway/apiGateway.js"]
    ports:
      - "3000:3000"
    environment:
      STUDENT_SERVICE_HOST: student-service
      COURSE_SERVICE_HOST: course-service
      ENROLLMENT_SERVICE_HOST: enrollment-service
    depends_on:
      - student-service
      - course-service
      - enrollment-service
